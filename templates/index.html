<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fish Feeder Control Panel</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 5px; color: #1e293b; }
        .clock { font-size: 1.2rem; color: #64748b; font-variant-numeric: tabular-nums; margin-bottom: 20px; }
        .stream-box { width: 100%; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 25px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); position: relative; padding-top: 75%; }
        .stream-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .btn-feed { background: #2563eb; color: white; border: none; padding: 15px 40px; font-size: 1.3rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(37,99,235,0.2); width: 80%; max-width: 300px; }
        .btn-feed:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-feed:active { transform: translateY(1px); }
        .log-section { margin-top: 40px; text-align: left; }
        .log-title { border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; font-size: 1.4rem; color: #1e293b; }
        .log-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f1f5f9; background: #fff; transition: background 0.15s; }
        .log-item:hover { background: #f8fafc; }
        .log-time { font-size: 1rem; color: #334155; font-weight: 500; }
        .thumbnail { width: 80px; height: 60px; border-radius: 4px; object-fit: cover; cursor: pointer; border: 2px solid #e2e8f0; transition: border 0.2s; }
        .thumbnail:hover { border-color: #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐟 Automated Fish Feeder</h1>
    <div class="clock" id="live-clock">Loading Device Time...</div>

    <div class="stream-box">
        <img src="{{ url_for('video_feed') }}" alt="Live Camera Feed Syncing..." style="transform: rotate(-90deg);">
    </div>

    <form action="{{ url_for('feed') }}" method="POST">
        <button type="submit" class="btn-feed" onclick="this.innerText='Serving Food...';">FEED NOW</button>
    </form>

    <div class="log-section">
        <h3 class="log-title">Feeding Log History</h3>
        {% if not logs %}
            <p style="color:#94a3b8; text-align:center; padding: 20px;">No feeding events recorded yet.</p>
        {% endif %}
        {% for log in logs %}
        <div class="log-item">
            <span class="log-time">✅ Served at: <strong>{{ log.time }}</strong></span>
            <a href="{{ url_for('get_photo', filename=log.image) }}" target="_blank">
                <img class="thumbnail" src="{{ url_for('get_photo', filename=log.image) }}" title="Click to view full snapshot" style="transform: rotate(-90deg);">
            </a>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    // Simple JavaScript running on the client side to keep time ticking smoothly
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = "System Time: " + now.toLocaleString();
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
